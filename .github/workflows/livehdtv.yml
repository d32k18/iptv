name: livehdtv

on:
  schedule:
    - cron: '0 */3 * * *'  # Run every 6 hours
  workflow_dispatch:      # Enable manual triggering



jobs:
  generate_m3u8:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create txt Folder
        run: mkdir -p txt            

      #- name: Run Python Script videotva m3u8
      #  run: python py/videotvam3u8.py > fr/videotva.m3u8

      - name: Run Python Script lci
        run: |
         python_output=$(python fr/py/lci-livehdtv.py)
         echo "#EXTM3U" > fr/videolci.m3u
         echo "#EXTINF:-1, LCI" >> fr/lci-livehdtv.m3u
         echo "$python_output" >> fr/lci-livehdtv.m3u  

      - name: Run Python Script m6
        run: |
         python_output=$(python fr/py/m6-livehdtv.py)
         curl_output2=$(curl -s -e "https://www.livehdtv.net" -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/96.0.4664.110 Safari/537.36" "$python_output")
         curl_output3=$(echo "$curl_output2" | sed 's|tracks-|https://livetvde.net/m6/tracks-|g')
         echo "$curl_output3" > fr/m6-livehdtv.m3u8  # Use single > to overwrite existing content

      - name: Run Python Script w9
        run: |
         python_output=$(python fr/py/w9-livehdtv.py)
         curl_output2=$(curl -s -e "https://www.livehdtv.net" -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/96.0.4664.110 Safari/537.36" "$python_output")
         curl_output3=$(echo "$curl_output2" | sed 's|tracks-|https://livetvde.net/w9/tracks-|g')
         echo "$curl_output3" > fr/w9-livehdtv.m3u8  # Use single > to overwrite existing content         

      - name: Run Python Script 6ter
        run: |
         python_output=$(python fr/py/6ter-livehdtv.py)
         curl_output2=$(curl -s -e "https://www.livehdtv.net" -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/96.0.4664.110 Safari/537.36" "$python_output")
         curl_output3=$(echo "$curl_output2" | sed 's|tracks-|https://livetvde.net/6ter/tracks-|g')
         echo "$curl_output3" > fr/6ter-livehdtv.m3u8  # Use single > to overwrite existing content

      - name: Run Python Script artvfr
        run: |
         python_output=$(python fr/py/artvfr-livehdtv.py)
         curl_output2=$(curl -s -e "https://www.livehdtv.net" -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/96.0.4664.110 Safari/537.36" "$python_output")
         curl_output3=$(echo "$curl_output2" | sed 's|tracks-|https://livetvde.net/artvfr/tracks-|g')
         echo "$curl_output3" > fr/artvfr-livehdtv.m3u8  # Use single > to overwrite existing content

      - name: Run Python Script cstar
        run: |
         python_output=$(python fr/py/cstar-livehdtv.py)
         curl_output2=$(curl -s -e "https://www.livehdtv.net" -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/96.0.4664.110 Safari/537.36" "$python_output")
         curl_output3=$(echo "$curl_output2" | sed 's|tracks-|https://livetvde.net/cstar/tracks-|g')
         echo "$curl_output3" > fr/cstar-livehdtv.m3u8  # Use single > to overwrite existing content

      - name: Pull changes from remote
        run: git pull origin main         

      - name: Commit and Push Changes
        uses: iptv/git-auto-commit-action@v4
        with:
          commit_message: "Update token"
          branch: main
          files: |
            fr/lci-livehdtv.m3u fr/m6-livehdtv.m3u8 fr/w9-livehdtv.m3u8 fr/6ter-livehdtv.m3u8 fr/cstar-livehdtv.m3u8 fr/artvfr-livehdtv.m3u8
        env:
          GITHUB_TOKEN: ${{ secrets.ROTANA_TOKEN }}
