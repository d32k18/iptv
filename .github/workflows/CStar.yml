name: CStar

on:
  schedule:
    - cron: '08 */3 * * *'
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
      - uses: actions/checkout@v4

      - name: config
        run: |
          git config --global user.email "<>"
          git config --global user.name "d32k18"
      
      - name: Update C8
        run: python3 dm/CStar.py > dm/CStar.m3u8
        
      - name: git add
        run: |
          git add -A
          ls -la 
          
      - name: commit & push
        run: |
          git pull origin main
          git commit -m "Update" -m "CStar"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/d32k18/iptv.git main
